<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ÉCOLE CAFÉ - 智能排班系統</title>
    
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="ÉCOLE CAFÉ">
    <meta name="theme-color" content="#ffffff">
    
    <link rel="apple-touch-icon" href="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHZpZXdCb3g9IjAgMCAxMDAgMTAwIj48cmVjdCB3aWR0aD0iMTAwIiBoZWlnaHQ9IjEwMCIgZmlsbD0iIzExMTgyNyIvPjx0ZXh0IHg9IjUwIiB5PSI1NSIgZm9udC1zaXplPSI0MCIgZm9udC1mYW1pbHk9IkFyaWFsIiBmaWxsPSIjZmZmIiB0ZXh0LWFuY2hvcj0ibWlkZGxlIiBkb21pbmFudC1iYXNlbGluZT0ibWlkZGxlIj5FQzwvdGV4dD48L3N2Zz4=">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Helvetica Neue', Arial, 'LiHei Pro', '微軟正黑體', sans-serif; background-color: #ffffff; color: #111827; }
        .table-container { height: calc(100vh - 180px); overflow: auto; -webkit-overflow-scrolling: touch; }
        
        table { border-collapse: collapse; width: 100%; table-layout: fixed; }
        th, td { border: 1px solid #e5e7eb; text-align: center; vertical-align: middle; }
        
        thead th { position: sticky; top: 0; background-color: #ffffff; z-index: 20; border-bottom: 2px solid #111827; vertical-align: middle; padding-top: 0.5rem; padding-bottom: 0.5rem; }
        tbody th.sticky-col { position: sticky; left: 0; background-color: #ffffff; z-index: 10; border-right: 2px solid #e5e7eb; white-space: nowrap; }
        thead th.sticky-corner { position: sticky; top: 0; left: 0; z-index: 30; background-color: #ffffff; border-bottom: 2px solid #111827; border-right: 2px solid #e5e7eb; }
        
        /* 防文字重疊優化 */
        .shift-cell { 
            cursor: pointer; 
            min-width: 65px; 
            height: 55px; 
            transition: background-color 0.2s; 
            line-height: 1.25; 
            white-space: pre-line; /* 支援斷行且不擠壓 */
            font-size: 0.8rem;
            padding: 4px;
            word-break: break-word;
        }
        .shift-cell:hover, .shift-cell:active { background-color: #f3f4f6; }
        
        /* 莫蘭迪色系 (三種顏色分類) */
        .color-morning { background-color: #dbe4d7; color: #3f4e38; } /* 莫蘭迪綠 (早班 D系列) */
        .color-evening { background-color: #ebd9d9; color: #5c3c3c; } /* 莫蘭迪粉 (晚班 N系列) */
        .color-split { background-color: #d6dbe0; color: #3b4252; }   /* 莫蘭迪灰藍 (兩頭班 A系列) */
        
        .shift-off { color: #111827; } /* 一般休假 ✖ */
        .shift-forced-off { color: #dc2626; font-weight: bold; } /* 指定排休 ❌ */
        .shift-admin { color: #4b5563; background-color: #f3f4f6; } /* 行政 / 公出 */
        
        .text-weekend { color: #6b7280; font-weight: bold; }
        .station-row th, .station-row td { background-color: #e5e7eb; } /* 內外場配置區深灰底色 */

        dialog::backdrop { background-color: rgba(0, 0, 0, 0.4); backdrop-filter: blur(2px); }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #ffffff; }
        ::-webkit-scrollbar-thumb { background: #d1d5db; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #9ca3af; }
    </style>
</head>
<body class="flex flex-col h-screen">

    <header class="bg-white border-b border-gray-200 p-4 z-40 flex flex-wrap justify-between items-center gap-4">
        <div>
            <h1 class="text-xl font-bold tracking-widest text-gray-900 flex items-center gap-2">
                ÉCOLE CAFÉ <span class="text-sm font-normal text-gray-500 ml-2">SCHEDULE SPACE</span>
            </h1>
            <div class="text-sm text-gray-600 mt-2 flex gap-4 items-center">
                <span>選擇月份：</span>
                <input type="month" id="monthSelector" class="border border-gray-300 rounded px-2 py-1 text-gray-700 outline-none focus:border-black" value="2026-07">
            </div>
        </div>

        <div class="flex flex-wrap gap-2">
            <button onclick="openEmpDialog()" class="border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 px-3 py-2 rounded-sm text-sm transition">👥 人員管理</button>
            <div class="w-px h-8 bg-gray-200 mx-1 hidden sm:block"></div>
            <button onclick="autoFill()" class="border border-black bg-black text-white hover:bg-gray-800 px-4 py-2 rounded-sm text-sm transition font-bold">自動帶入預設</button>
            <button onclick="clearSchedule()" class="border border-gray-300 bg-white text-gray-700 hover:bg-red-50 hover:text-red-600 px-3 py-2 rounded-sm text-sm transition">清空當月資料</button>
            <div class="w-px h-8 bg-gray-200 mx-1 hidden sm:block"></div>
            <button onclick="exportToImage()" class="border border-black bg-white text-black hover:bg-gray-50 px-4 py-2 rounded-sm text-sm transition">匯出圖片 (JPG)</button>
            <div class="w-px h-8 bg-gray-200 mx-1 hidden sm:block"></div>
            <button onclick="exportJSON()" class="border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 px-3 py-2 rounded-sm text-sm transition">匯出 (JSON)</button>
            <button onclick="triggerImport()" class="border border-gray-300 bg-white text-gray-700 hover:bg-gray-50 px-3 py-2 rounded-sm text-sm transition">匯入 (JSON)</button>
            <input type="file" id="importJSON" accept=".json" class="hidden" onchange="importJSON(event)">
        </div>
    </header>

    <main class="flex-1 p-4 overflow-hidden flex flex-col bg-white">
        <div class="border border-gray-200 flex-1 table-container relative" id="scheduleCaptureArea">
            <table id="scheduleTable">
                <thead id="tableHead"></thead>
                <tbody id="tableBody"></tbody>
                <tbody id="stationBody" class="station-row border-t-2 border-gray-300"></tbody>
                <tbody id="noteBody" class="border-t-2 border-gray-300"></tbody>
            </table>
        </div>
        
        <div class="mt-3 text-xs text-gray-500 flex flex-wrap gap-4 items-center">
            <span class="flex items-center gap-1"><div class="w-3 h-3 bg-[#dbe4d7]"></div> 早班(D)</span>
            <span class="flex items-center gap-1"><div class="w-3 h-3 bg-[#ebd9d9]"></div> 晚班(N)</span>
            <span class="flex items-center gap-1"><div class="w-3 h-3 bg-[#d6dbe0]"></div> 兩頭班(A)</span>
            <span class="flex items-center gap-1"><span class="text-red-600 font-bold">❌</span> 指定休</span>
            <span class="flex items-center gap-1"><span>✖</span> 排休</span>
        </div>
    </main>

    <!-- 人員管理模態框 -->
    <dialog id="empDialog" class="rounded-lg shadow-xl p-0 w-11/12 max-w-sm border border-gray-200">
        <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <h3 class="font-bold text-gray-800 tracking-wide">人員管理</h3>
            <button onclick="closeEmpDialog()" class="text-gray-400 hover:text-black text-xl leading-none">&times;</button>
        </div>
        <div class="p-4 bg-white flex flex-col gap-3">
            <div id="empList" class="max-h-60 overflow-y-auto border border-gray-200 rounded p-2 flex flex-col gap-2"></div>
            <div class="border-t pt-3 flex gap-2">
                <input type="text" id="newEmpName" placeholder="新員工姓名" class="border border-gray-300 rounded px-2 py-1 flex-1 text-sm outline-none focus:border-black">
                <select id="newEmpType" class="border border-gray-300 rounded px-2 py-1 text-sm outline-none focus:border-black">
                    <option value="FT">正職</option>
                    <option value="PT">工讀</option>
                </select>
                <button onclick="addEmp()" class="bg-black text-white px-3 py-1 rounded text-sm hover:bg-gray-800">新增</button>
            </div>
            <p class="text-[10px] text-gray-400 text-center mt-1">修改姓名後會自動儲存並更新表格</p>
        </div>
    </dialog>

    <!-- 編輯班別模態框 -->
    <dialog id="shiftDialog" class="rounded-lg shadow-xl p-0 w-11/12 max-w-md border border-gray-200">
        <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <h3 class="font-bold text-gray-800 tracking-wide" id="dialogTitle">編輯班別</h3>
            <button onclick="closeDialog()" class="text-gray-400 hover:text-black text-xl leading-none">&times;</button>
        </div>
        <div class="p-4 flex flex-col gap-4 bg-white">
            <p class="text-sm text-gray-500 font-medium" id="dialogSubtitle"></p>
            
            <div class="grid grid-cols-4 gap-2">
                <button onclick="setShift('✖')" class="border border-gray-200 py-2 rounded text-sm hover:bg-gray-50">✖ 排休</button>
                <button onclick="setShift('❌')" class="border border-red-200 text-red-600 py-2 rounded text-sm hover:bg-red-50 font-bold">❌ 指定休</button>
                <button onclick="setShift('行政')" class="border border-gray-200 py-2 rounded text-sm hover:bg-gray-50">行政</button>
                <button onclick="setShift('公出')" class="border border-gray-200 py-2 rounded text-sm hover:bg-gray-50">公出</button>
            </div>
            
            <div class="text-xs text-gray-400 font-bold mt-2 tracking-widest">早班系列</div>
            <div class="grid grid-cols-4 gap-2 text-sm">
                <button onclick="setShift('D1\n0830-1700')" class="bg-[#dbe4d7] text-[#3f4e38] py-2 rounded hover:opacity-80">D1<br><span class="text-[10px]">0830-1700</span></button>
                <button onclick="setShift('D2\n0900-1730')" class="bg-[#dbe4d7] text-[#3f4e38] py-2 rounded hover:opacity-80">D2<br><span class="text-[10px]">0900-1730</span></button>
                <button onclick="setShift('D3\n0900-1500')" class="bg-[#dbe4d7] text-[#3f4e38] py-2 rounded hover:opacity-80">D3<br><span class="text-[10px]">0900-1500</span></button>
                <button onclick="setShift('D4\n1230-1630')" class="bg-[#dbe4d7] text-[#3f4e38] py-2 rounded hover:opacity-80">D4<br><span class="text-[10px]">1230-1630</span></button>
            </div>

            <div class="text-xs text-gray-400 font-bold mt-1 tracking-widest">晚班系列</div>
            <div class="grid grid-cols-2 gap-2 text-sm">
                <button onclick="setShift('N1\n1230-2130')" class="bg-[#ebd9d9] text-[#5c3c3c] py-2 rounded hover:opacity-80">N1 (12:30-21:30)</button>
                <button onclick="setShift('N2\n1730-2130')" class="bg-[#ebd9d9] text-[#5c3c3c] py-2 rounded hover:opacity-80">N2 (17:30-21:30)</button>
            </div>

            <div class="text-xs text-gray-400 font-bold mt-1 tracking-widest">兩頭班系列</div>
            <div class="grid grid-cols-2 gap-2 text-sm">
                <button onclick="setShift('A1\n09-13/17-21')" class="bg-[#d6dbe0] text-[#3b4252] py-2 rounded hover:opacity-80 leading-tight">A1<br><span class="text-[10px]">0900-1300 / 1700-2100</span></button>
                <button onclick="setShift('A2\n09-13/17-21')" class="bg-[#d6dbe0] text-[#3b4252] py-2 rounded hover:opacity-80 leading-tight">A2<br><span class="text-[10px]">0930-1330 / 1730-2130</span></button>
            </div>
            
            <div class="flex items-center gap-2 mt-2 pt-4 border-t border-gray-100">
                <input type="text" id="customShift" class="border border-gray-300 rounded px-3 py-2 flex-1 text-sm outline-none focus:border-black" placeholder="手動輸入特殊班別...">
                <button onclick="setShift(document.getElementById('customShift').value)" class="bg-black text-white px-4 py-2 rounded text-sm hover:bg-gray-800">確認</button>
            </div>
        </div>
    </dialog>

    <!-- 站點與備註與確認模態框 -->
    <dialog id="stationDialog" class="rounded-lg shadow-xl p-0 w-11/12 max-w-sm border border-gray-200">
        <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <h3 class="font-bold text-gray-800 tracking-wide" id="stationDialogTitle">指派人員</h3>
            <button onclick="closeStationDialog()" class="text-gray-400 hover:text-black text-xl leading-none">&times;</button>
        </div>
        <div class="p-4 bg-white">
            <div id="stationCandidates" class="flex flex-col gap-2"></div>
            <button onclick="setStation('')" class="w-full mt-4 border border-red-200 text-red-600 py-2 rounded text-sm hover:bg-red-50">清除人員</button>
        </div>
    </dialog>

    <dialog id="noteDialog" class="rounded-lg shadow-xl p-0 w-11/12 max-w-sm border border-gray-200">
        <div class="p-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
            <h3 class="font-bold text-gray-800 tracking-wide" id="noteDialogTitle">當日備註</h3>
            <button onclick="closeNoteDialog()" class="text-gray-400 hover:text-black text-xl leading-none">&times;</button>
        </div>
        <div class="p-4 bg-white flex flex-col gap-3">
            <div class="grid grid-cols-3 gap-2">
                <button onclick="setNote('員工會議')" class="border border-gray-200 py-2 rounded text-sm hover:bg-gray-50">員工會議</button>
                <button onclick="setNote('主管會議')" class="border border-gray-200 py-2 rounded text-sm hover:bg-gray-50">主管會議</button>
                <button onclick="setNote('店休')" class="border border-red-200 text-red-600 py-2 rounded text-sm hover:bg-red-50">店休</button>
            </div>
            <textarea id="customNote" rows="3" class="border border-gray-300 rounded p-2 text-sm w-full mt-2 outline-none focus:border-black" placeholder="輸入自訂備註..."></textarea>
            <div class="flex gap-2">
                <button onclick="setNote('')" class="border border-gray-300 text-gray-600 py-2 rounded text-sm flex-1 hover:bg-gray-50">清除</button>
                <button onclick="setNote(document.getElementById('customNote').value)" class="bg-black text-white py-2 rounded text-sm flex-1 hover:bg-gray-800">儲存備註</button>
            </div>
        </div>
    </dialog>

    <dialog id="confirmDialog" class="rounded-lg shadow-xl p-0 w-11/12 max-w-sm border border-gray-200">
        <div class="p-5 bg-white flex flex-col gap-4">
            <p class="text-gray-800 text-sm leading-relaxed whitespace-pre-line" id="confirmMsg"></p>
            <div class="flex justify-end gap-2 mt-2">
                <button onclick="resolveConfirm(false)" class="border border-gray-300 text-gray-600 px-4 py-2 rounded text-sm hover:bg-gray-50">取消</button>
                <button onclick="resolveConfirm(true)" class="bg-black text-white px-4 py-2 rounded text-sm hover:bg-gray-800">確定</button>
            </div>
        </div>
    </dialog>

    <script>
        // 人員名單動態化 (可編輯)
        let employees = JSON.parse(localStorage.getItem('ecoleEmployees')) || [
            { id: 'FT1', name: 'Rita', type: 'FT' },
            { id: 'FT2', name: '訓峰', type: 'FT' },
            { id: 'FT3', name: '沛宣', type: 'FT' },
            { id: 'FT4', name: '龍', type: 'FT' },
            { id: 'FT5', name: '沐', type: 'FT' },
            { id: 'PT1', name: 'JEFF', type: 'PT' },
            { id: 'PT2', name: '煥哲', type: 'PT' },
            { id: 'PT3', name: '澤凱', type: 'PT' },
            { id: 'PT4', name: '書書', type: 'PT' }
        ];

        const stations = ['早吧台', '早廚', '外場', '晚吧台', '晚廚'];
        
        let scheduleData = JSON.parse(localStorage.getItem('ecoleSchedule')) || {};
        let stationData = JSON.parse(localStorage.getItem('ecoleStation')) || {};
        let noteData = JSON.parse(localStorage.getItem('ecoleNote')) || {};
        
        let currentYearMonth = '2026-07';
        let selectedCell = { empId: null, day: null, type: null, station: null };
        let confirmResolver = null;

        const shiftDialog = document.getElementById('shiftDialog');
        const stationDialog = document.getElementById('stationDialog');
        const noteDialog = document.getElementById('noteDialog');
        const confirmDialog = document.getElementById('confirmDialog');
        const empDialog = document.getElementById('empDialog');

        function init() {
            document.getElementById('monthSelector').value = currentYearMonth;
            document.getElementById('monthSelector').addEventListener('change', (e) => {
                currentYearMonth = e.target.value;
                renderTable();
            });
            renderTable();
        }

        // --- STREAMING_CHUNK:Rendering Table Data... ---
        function renderTable() {
            const [year, month] = currentYearMonth.split('-').map(Number);
            const daysInMonth = new Date(year, month, 0).getDate();
            const firstDayOfWeek = new Date(year, month - 1, 1).getDay();
            const weekDays = ['日', '一', '二', '三', '四', '五', '六'];

            // 初始化當月結構
            if (!scheduleData[currentYearMonth]) scheduleData[currentYearMonth] = {};
            employees.forEach(emp => { if(!scheduleData[currentYearMonth][emp.id]) scheduleData[currentYearMonth][emp.id] = {}; });
            
            if (!stationData[currentYearMonth]) {
                stationData[currentYearMonth] = {};
                stations.forEach(st => stationData[currentYearMonth][st] = {});
            }
            if (!noteData[currentYearMonth]) noteData[currentYearMonth] = {};

            // 表頭 (Thead)
            let theadHTML = `<tr><th rowspan="2" class="sticky-corner w-10 text-xs px-1 text-gray-500 font-normal">TYPE</th><th rowspan="2" class="sticky-corner px-2 text-sm" style="left: 40px; min-width: 60px;">姓名</th>`;
            for (let i = 1; i <= daysInMonth; i++) {
                theadHTML += `<th class="px-1 text-sm font-normal border-b text-gray-500">${i}</th>`;
            }
            theadHTML += `<th rowspan="2" class="px-2 min-w-[80px] text-xs font-normal text-gray-500">月休 / 工時</th></tr><tr>`;
            for (let i = 1; i <= daysInMonth; i++) {
                const dayIndex = (firstDayOfWeek + i - 1) % 7;
                const isWeekend = dayIndex === 0 || dayIndex === 6;
                theadHTML += `<th class="px-1 text-xs border-t-0 ${isWeekend ? 'text-weekend' : 'text-gray-400'}">${weekDays[dayIndex]}</th>`;
            }
            theadHTML += `</tr>`;
            document.getElementById('tableHead').innerHTML = theadHTML;

            // 員工班表 (Tbody)
            let tbodyHTML = '';
            let currentType = '';

            employees.forEach(emp => {
                let typeLabel = '';
                if (emp.type !== currentType) {
                    currentType = emp.type;
                    const rowSpan = employees.filter(e => e.type === currentType).length;
                    const typeText = currentType === 'FT' ? '正職' : '工讀';
                    typeLabel = `<th rowspan="${rowSpan}" class="sticky-col text-vertical tracking-widest text-xs text-gray-500 font-normal" style="writing-mode: vertical-lr;">${typeText}</th>`;
                }

                tbodyHTML += `<tr>${typeLabel}<th class="sticky-col px-2 font-normal text-sm" style="left: 40px;">${emp.name}</th>`;

                let daysOff = 0;
                let totalHours = 0;

                for (let i = 1; i <= daysInMonth; i++) {
                    const shift = scheduleData[currentYearMonth]?.[emp.id]?.[i] || '';
                    let cellClass = 'shift-cell ';
                    
                    if (shift === '✖') { cellClass += 'shift-off font-bold'; daysOff++; }
                    else if (shift === '❌') { cellClass += 'shift-forced-off'; daysOff++; }
                    else if (shift === '行政' || shift === '公出') { cellClass += 'shift-admin'; }
                    else if (shift.startsWith('D')) { cellClass += 'color-morning'; }
                    else if (shift.startsWith('N')) { cellClass += 'color-evening'; }
                    else if (shift.startsWith('A')) { cellClass += 'color-split'; }

                    if (shift && !['✖', '❌', '行政', '公出'].includes(shift)) {
                        totalHours += calculateHours(shift);
                    }

                    tbodyHTML += `<td class="${cellClass}" onclick="openDialog('${emp.id}', ${i}, '${emp.name}')">${shift}</td>`;
                }

                let statsText = emp.type === 'FT' 
                    ? `<span class="${daysOff < 8 ? 'text-black font-bold' : 'text-gray-600'}">${daysOff} 天</span>`
                    : `<span class="text-gray-600">${totalHours.toFixed(1)} hr</span>`;
                
                tbodyHTML += `<td class="px-2 text-xs">${statsText}</td></tr>`;
            });
            document.getElementById('tableBody').innerHTML = tbodyHTML;

            // 站點配置與備註
            let stationHTML = `<tr><td colspan="${daysInMonth + 3}" class="bg-gray-100 text-left px-4 py-1 text-xs text-gray-500 font-bold tracking-widest border-t-2 border-gray-300">STATION ASSIGNMENTS (內外場配置)</td></tr>`;
            stations.forEach(st => {
                stationHTML += `<tr><th colspan="2" class="sticky-col px-2 py-2 text-sm font-normal text-gray-700 bg-[#e5e7eb]" style="left: 0;">${st}</th>`;
                for (let i = 1; i <= daysInMonth; i++) {
                    const sName = stationData[currentYearMonth]?.[st]?.[i] || '';
                    stationHTML += `<td class="shift-cell text-xs bg-[#e5e7eb]" onclick="openStationDialog('${st}', ${i})">${sName}</td>`;
                }
                stationHTML += `<td class="bg-[#e5e7eb]"></td></tr>`;
            });
            document.getElementById('stationBody').innerHTML = stationHTML;

            let noteHTML = `<tr><th colspan="2" class="sticky-col px-2 py-2 text-sm font-normal text-gray-700 bg-white" style="left: 0;">備註</th>`;
            for (let i = 1; i <= daysInMonth; i++) {
                const n = noteData[currentYearMonth]?.[i] || '';
                noteHTML += `<td class="shift-cell text-[10px] text-gray-500" onclick="openNoteDialog(${i})">${n}</td>`;
            }
            noteHTML += `<td></td></tr>`;
            document.getElementById('noteBody').innerHTML = noteHTML;

            saveData();
        }

        // --- STREAMING_CHUNK:Event Handlers and Employee Mgmt... ---
        function calculateHours(shiftStr) {
            if(shiftStr.includes('A1') || shiftStr.includes('A2')) return 8;
            if(shiftStr.includes('D1') || shiftStr.includes('D2')) return 8;
            if(shiftStr.includes('D3')) return 6;
            if(shiftStr.includes('D4') || shiftStr.includes('N2')) return 4;
            if(shiftStr.includes('N1')) return 8;
            return 0;
        }

        function openEmpDialog() { renderEmpList(); empDialog.showModal(); }
        function closeEmpDialog() { empDialog.close(); renderTable(); }
        
        function renderEmpList() {
            const list = document.getElementById('empList');
            list.innerHTML = employees.map(emp => `
                <div class="flex justify-between items-center bg-white p-2 rounded border border-gray-200">
                    <div class="flex gap-2 items-center flex-1">
                        <span class="text-xs font-bold ${emp.type==='FT'?'text-gray-800 bg-gray-200':'text-gray-500 bg-gray-100'} px-2 py-1 rounded w-10 text-center">${emp.type}</span>
                        <input type="text" value="${emp.name}" onchange="updateEmpName('${emp.id}', this.value)" class="border border-gray-300 px-2 py-1 text-sm rounded flex-1 outline-none focus:border-black">
                    </div>
                    <button onclick="deleteEmp('${emp.id}')" class="ml-2 text-red-500 hover:text-red-700 text-xs font-bold px-2 py-1 rounded">刪除</button>
                </div>
            `).join('');
        }
        
        function updateEmpName(id, newName) {
            const emp = employees.find(e => e.id === id);
            if(emp) { emp.name = newName; saveData(); renderTable(); }
        }
        
        function deleteEmp(id) {
            employees = employees.filter(e => e.id !== id);
            saveData(); renderEmpList(); renderTable();
        }
        
        function addEmp() {
            const nameInput = document.getElementById('newEmpName');
            const name = nameInput.value.trim();
            const type = document.getElementById('newEmpType').value;
            if(!name) return;
            
            const newId = type + Date.now();
            employees.push({ id: newId, name, type });
            nameInput.value = '';
            saveData(); renderEmpList(); renderTable();
        }

        function openDialog(empId, day, empName) {
            selectedCell = { type: 'shift', empId, day };
            document.getElementById('dialogSubtitle').innerText = `${empName} - ${currentYearMonth}-${day.toString().padStart(2, '0')}`;
            document.getElementById('customShift').value = '';
            shiftDialog.showModal();
        }

        function setShift(val) {
            if(val.trim() === '') return;
            scheduleData[currentYearMonth][selectedCell.empId][selectedCell.day] = val;
            shiftDialog.close(); renderTable();
        }
        function closeDialog() { shiftDialog.close(); }

        function openStationDialog(station, day) {
            selectedCell = { type: 'station', station, day };
            document.getElementById('stationDialogTitle').innerText = `${station} - ${day}日`;
            
            let html = '';
            employees.forEach(emp => {
                let shift = scheduleData[currentYearMonth]?.[emp.id]?.[day] || '';
                if (shift && !['✖', '❌', '行政', '公出'].includes(shift)) {
                    html += `<button onclick="setStation('${emp.name}')" class="border border-gray-200 py-2 rounded text-sm hover:bg-gray-50 text-left px-4">${emp.name} <span class="text-xs text-gray-400 float-right mt-0.5">${shift.split('\n')[0]}</span></button>`;
                }
            });
            
            if(html === '') html = '<p class="text-sm text-gray-400 text-center py-4">當日無可用排班人員</p>';
            document.getElementById('stationCandidates').innerHTML = html;
            stationDialog.showModal();
        }
        
        function setStation(name) {
            stationData[currentYearMonth][selectedCell.station][selectedCell.day] = name;
            stationDialog.close(); renderTable();
        }
        function closeStationDialog() { stationDialog.close(); }

        function openNoteDialog(day) {
            selectedCell = { type: 'note', day };
            document.getElementById('noteDialogTitle').innerText = `${day}日 備註`;
            document.getElementById('customNote').value = noteData[currentYearMonth]?.[day] || '';
            noteDialog.showModal();
        }

        function setNote(val) {
            noteData[currentYearMonth][selectedCell.day] = val;
            noteDialog.close(); renderTable();
        }
        function closeNoteDialog() { noteDialog.close(); }

        function customConfirm(msg) {
            document.getElementById('confirmMsg').innerText = msg;
            confirmDialog.showModal();
            return new Promise(resolve => { confirmResolver = resolve; });
        }
        function resolveConfirm(result) {
            confirmDialog.close();
            if(confirmResolver) confirmResolver(result);
        }

        // --- STREAMING_CHUNK:Advanced Auto-Fill Engine... ---
        async function autoFill() {
            const confirm = await customConfirm('即將執行智能排班：\n1. 正職(FT)確保月休剛好 8 天且交錯排休\n2. N1(晚班)、A1與D1「僅限」安排正職\n3. 工讀(PT)填補剩餘空缺\n4. 自動分配內外場站點\n\n確定執行嗎？');
            if(!confirm) return;
            
            const [year, month] = currentYearMonth.split('-').map(Number);
            const daysInMonth = new Date(year, month, 0).getDate();
            const firstDayOfWeek = new Date(year, month - 1, 1).getDay();

            // 1. 正職(FT)精準 8 天排休
            employees.filter(e => e.type === 'FT').forEach(emp => {
                let offDays = 0;
                for(let i=1; i<=daysInMonth; i++) {
                    let s = scheduleData[currentYearMonth][emp.id][i];
                    if(s === '✖' || s === '❌') offDays++;
                }
                
                let neededOff = Math.max(0, 8 - offDays);
                while(neededOff > 0) {
                    let possibleDays = [];
                    for(let i=1; i<=daysInMonth; i++) {
                        if(!scheduleData[currentYearMonth][emp.id][i]) {
                            // 計算當天已經有多少 FT 排休 (交錯排休權重)
                            let othersOff = employees.filter(e => e.type === 'FT' && ['✖', '❌'].includes(scheduleData[currentYearMonth][e.id][i])).length;
                            possibleDays.push({day: i, weight: othersOff + Math.random()});
                        }
                    }
                    if(possibleDays.length === 0) break;
                    possibleDays.sort((a,b) => a.weight - b.weight); // 優先選少人休的日子
                    scheduleData[currentYearMonth][emp.id][possibleDays[0].day] = '✖';
                    neededOff--;
                }
            });

            // 2. 每日班別指派
            for (let day = 1; day <= daysInMonth; day++) {
                const dayIndex = (firstDayOfWeek + day - 1) % 7;
                const isWeekend = dayIndex === 0 || dayIndex === 6;
                const requiredStaff = isWeekend ? 5 : 4; 

                let workingToday = [];
                let emptyPool = [];

                employees.forEach(emp => {
                    let s = scheduleData[currentYearMonth][emp.id][day];
                    if (['✖', '❌', '公出', '行政'].includes(s)) {
                        // Not available
                    } else if (s) {
                        workingToday.push(emp);
                    } else {
                        emptyPool.push(emp);
                    }
                });

                let emptyFTs = emptyPool.filter(e => e.type === 'FT').sort(() => Math.random() - 0.5);
                let emptyPTs = emptyPool.filter(e => e.type === 'PT').sort(() => Math.random() - 0.5);
                let assignedCount = workingToday.length;

                // 核心規則：強制由 FT 擔任的特定班別 (N1晚, A1兩頭, D1早)
                const mandatoryFTShifts = ['N1\n1230-2130', 'A1\n09-13/17-21', 'D1\n0830-1700'];
                
                mandatoryFTShifts.forEach(shiftStr => {
                    // 如果這個班還沒人上手動排
                    if (!workingToday.some(emp => scheduleData[currentYearMonth][emp.id][day] === shiftStr)) {
                        if (emptyFTs.length > 0 && assignedCount < requiredStaff) {
                            let ft = emptyFTs.pop(); // 抽一個正職
                            scheduleData[currentYearMonth][ft.id][day] = shiftStr;
                            workingToday.push(ft);
                            assignedCount++;
                        }
                    }
                });

                // 填縫規則：剩下的空缺交由工讀(PT)優先填補，班別為 D2/D3/D4
                let fallbackShifts = ['D2\n0900-1730', 'D3\n0900-1500', 'D4\n1230-1630'];
                let shiftIdx = 0;
                let remainingPool = [...emptyFTs, ...emptyPTs].sort(() => Math.random() - 0.5);

                while (assignedCount < requiredStaff && remainingPool.length > 0) {
                    let emp = remainingPool.pop();
                    scheduleData[currentYearMonth][emp.id][day] = fallbackShifts[shiftIdx % fallbackShifts.length];
                    workingToday.push(emp);
                    assignedCount++;
                    shiftIdx++;
                }

                // 沒被選中的人，標記為休假
                remainingPool.forEach(emp => {
                    scheduleData[currentYearMonth][emp.id][day] = '✖';
                });

                // 3. 站點自動分配 (晚吧台、晚廚優先找 N 或 A 班的人)
                let unassignedEmpsForStation = [...workingToday].sort(() => Math.random() - 0.5);
                const lateStations = ['晚吧台', '晚廚'];
                
                stations.forEach(st => {
                    if (!stationData[currentYearMonth][st][day] && lateStations.includes(st)) {
                        let lateEmpIdx = unassignedEmpsForStation.findIndex(e => {
                            let s = scheduleData[currentYearMonth][e.id][day] || '';
                            return s.includes('N') || s.includes('A');
                        });
                        if (lateEmpIdx !== -1) {
                            stationData[currentYearMonth][st][day] = unassignedEmpsForStation.splice(lateEmpIdx, 1)[0].name;
                        }
                    }
                });

                // 剩下站點隨機分配
                stations.forEach(st => {
                    if (!stationData[currentYearMonth][st][day]) {
                        if (unassignedEmpsForStation.length > 0) {
                            stationData[currentYearMonth][st][day] = unassignedEmpsForStation.pop().name;
                        } else {
                            stationData[currentYearMonth][st][day] = '';
                        }
                    }
                });
            }
            renderTable();
        }

        async function clearSchedule() {
            const confirm = await customConfirm(`確定要清空 ${currentYearMonth} 的所有排班與站點資料嗎？`);
            if(confirm) {
                scheduleData[currentYearMonth] = {};
                stationData[currentYearMonth] = {};
                noteData[currentYearMonth] = {};
                employees.forEach(emp => scheduleData[currentYearMonth][emp.id] = {});
                stations.forEach(st => stationData[currentYearMonth][st] = {});
                renderTable();
            }
        }

        function saveData() {
            localStorage.setItem('ecoleEmployees', JSON.stringify(employees));
            localStorage.setItem('ecoleSchedule', JSON.stringify(scheduleData));
            localStorage.setItem('ecoleStation', JSON.stringify(stationData));
            localStorage.setItem('ecoleNote', JSON.stringify(noteData));
        }

        // --- STREAMING_CHUNK:Export functions... ---
        function exportToImage() {
            const originalElement = document.getElementById('scheduleCaptureArea');
            const cloneWrapper = document.createElement('div');
            cloneWrapper.style.position = 'absolute';
            cloneWrapper.style.top = '-9999px';
            cloneWrapper.style.left = '0';
            cloneWrapper.style.width = 'max-content';
            cloneWrapper.style.backgroundColor = '#ffffff';
            cloneWrapper.style.padding = '32px 24px'; // 增加整體邊距使圖片更大氣
            
            // 動態加入：匯出圖片時的「年份與月份」置中大標題
            const titleEl = document.createElement('div');
            const [year, month] = currentYearMonth.split('-');
            titleEl.innerText = `ÉCOLE CAFÉ ${year} 年 ${parseInt(month, 10)} 月份排班表`;
            titleEl.style.textAlign = 'center';
            titleEl.style.fontSize = '26px';
            titleEl.style.fontWeight = 'bold';
            titleEl.style.marginBottom = '20px';
            titleEl.style.letterSpacing = '0.1em';
            titleEl.style.color = '#111827';
            cloneWrapper.appendChild(titleEl);
            
            const clone = originalElement.cloneNode(true);
            clone.style.height = 'auto';
            clone.style.overflow = 'visible';
            clone.style.border = '1px solid #e5e7eb';
            
            const table = clone.querySelector('table');
            table.style.width = 'auto';
            
            const cells = clone.querySelectorAll('th, td');
            cells.forEach(el => { 
                el.style.position = 'static'; 
                el.style.textAlign = 'center';
                // 確保文字置中不會跑到下方
                el.style.verticalAlign = 'middle';
            });
            
            cloneWrapper.appendChild(clone);
            document.body.appendChild(cloneWrapper);

            html2canvas(cloneWrapper, { 
                scale: 2, 
                backgroundColor: '#ffffff',
                useCORS: true
            }).then(canvas => {
                document.body.removeChild(cloneWrapper);
                const link = document.createElement('a');
                link.download = `EcoleCafe_${currentYearMonth}_完整班表.jpg`;
                link.href = canvas.toDataURL('image/jpeg', 1.0);
                link.click();
            });
        }

        function exportJSON() {
            const data = { employees, scheduleData, stationData, noteData };
            const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(data));
            const link = document.createElement('a');
            link.setAttribute("href", dataStr);
            link.setAttribute("download", `EcoleCafe_Backup_${currentYearMonth}.json`);
            document.body.appendChild(link);
            link.click();
            link.remove();
        }

        function triggerImport() {
            document.getElementById('importJSON').click();
        }

        function importJSON(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.employees && data.scheduleData) {
                        employees = data.employees;
                        scheduleData = data.scheduleData;
                        stationData = data.stationData || {};
                        noteData = data.noteData || {};
                        saveData();
                        renderTable();
                        if(typeof renderEmpList === 'function') renderEmpList();
                        customConfirm("資料匯入成功！\n畫面已更新為備份檔進度。");
                    } else {
                        customConfirm("無效的備份檔案格式！\n請確認這是系統匯出的 JSON 檔。");
                    }
                } catch (err) {
                    customConfirm("讀取檔案失敗！\n檔案可能損毀或非 JSON 格式。");
                }
            };
            reader.readAsText(file);
            event.target.value = ''; // 重置 Input
        }

        init();
    </script>
